services:
  redis:
    image: redis:7.2-alpine
    container_name: redis-server
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    networks:
      - redis_network
volumes:
  redis_data:
networks:
  redis_network:
    driver: bridge
